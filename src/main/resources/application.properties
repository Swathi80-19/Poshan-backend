spring.application.name=poshan-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:poshan}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${MYSQL_USERNAME:root}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${MYSQL_PASSWORD:}}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

server.port=${PORT:8080}

app.frontend-base-url=${FRONTEND_BASE_URL:}
app.backend-base-url=${BACKEND_BASE_URL:${RENDER_EXTERNAL_URL:}}
app.auth.jwt.secret=${JWT_SECRET:poshan-dev-jwt-secret-change-this-in-production-123456789}
app.auth.jwt.access-token-ttl-days=${JWT_ACCESS_TOKEN_TTL_DAYS:7}
app.auth.email-verification.from-address=${MAIL_FROM:}
app.auth.email-verification.token-ttl-minutes=${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:30}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.*:*,http://*.local:*,https://*.onrender.com,https://*.vercel.app}

springdoc.pathsToMatch=/api/**
springdoc.swagger-ui.path=/swagger-ui.html
