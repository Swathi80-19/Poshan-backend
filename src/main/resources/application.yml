spring:
  application:
    name: poshan-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:poshan}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
    username: ${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${MYSQL_USERNAME:root}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${MYSQL_PASSWORD:}}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  backend-base-url: ${BACKEND_BASE_URL:http://localhost:8080}
  auth:
    jwt:
      secret: ${JWT_SECRET:poshan-dev-jwt-secret-change-this-in-production-123456789}
      access-token-ttl-days: ${JWT_ACCESS_TOKEN_TTL_DAYS:7}
    email-verification:
      from-address: ${MAIL_FROM:}
      token-ttl-minutes: ${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.*:*,http://*.local:*,https://*.onrender.com,https://*.vercel.app}
