spring:
  application:
    name: poshan-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:poshan}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - https://localhost:*
      - https://127.0.0.1:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
      - http://*.local:*
