spring:
  datasource:
    url: jdbc:h2:file:./data/poshan;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - https://localhost:*
      - https://127.0.0.1:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
      - http://*.local:*
