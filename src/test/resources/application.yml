spring:
  datasource:
    url: jdbc:h2:mem:poshan;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 0

app:
  auth:
    jwt:
      secret: poshan-test-jwt-secret-change-this-before-production-123456789
      access-token-ttl-days: 7
